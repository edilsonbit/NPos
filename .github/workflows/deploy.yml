name: Deploy to GitHub Pages

on:
  push:
    branches: [main, homolog]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create production env
        run: |
          printf 'VITE_DATA_SOURCE=firebase\n' > .env.production
          printf 'VITE_FIREBASE_API_KEY=AIzaSyCSugFTAyZBQAiaixEq0TIlGevf1y2T3sk\n' >> .env.production
          printf 'VITE_FIREBASE_AUTH_DOMAIN=ics-npos.firebaseapp.com\n' >> .env.production
          printf 'VITE_FIREBASE_PROJECT_ID=ics-npos\n' >> .env.production
          printf 'VITE_FIREBASE_APP_ID=1:664455694791:web:1e1642282499befd36f1e2\n' >> .env.production
          printf 'VITE_FIREBASE_USE_EMULATOR=false\n' >> .env.production

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
